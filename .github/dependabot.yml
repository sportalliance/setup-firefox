version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    cooldown:
      default-days: 7
    commit-message:
      prefix: "fix(deps)"
      prefix-development: 'chore(deps):'
    groups:
      actions:
        patterns:
          - "@actions/*"
      typescript:
        patterns:
          - "typescript"
          - "@typescript-*"
